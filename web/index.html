<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>pokeemerald-wasm</title>
  <link rel="stylesheet" href="/web/style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-25RQ7HFHXS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-25RQ7HFHXS');
  </script>
</head>
<body>
  <main class="shell" aria-label="pokeemerald-wasm emulator">
    <header class="masthead">
      <h1>pokeemerald-wasm</h1>
      <a class="github-link" href="https://github.com/tripplyons/pokeemerald-wasm" target="_blank" rel="noreferrer" aria-label="Open pokeemerald-wasm on GitHub">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 .5a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.4-4-1.4-.5-1.4-1.3-1.8-1.3-1.8-1.1-.8.1-.8.1-.8 1.2.1 1.9 1.3 1.9 1.3 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.3-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0C17.6 4.7 18.6 5 18.6 5c.6 1.6.2 2.9.1 3.2.8.8 1.3 1.9 1.3 3.2 0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.1.9 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .5Z" />
        </svg>
        <span>tripplyons</span>
      </a>
    </header>

    <section class="display-panel" aria-label="Game display">
      <canvas id="screen" width="240" height="160" aria-label="Game screen"></canvas>
    </section>

    <div class="status" id="status">loading wasm…</div>

    <section class="controls" aria-label="Controls">
      <div class="dpad" aria-label="Directional pad">
        <button data-key="up" aria-label="Up">↑</button>
        <button data-key="left" aria-label="Left">←</button>
        <button data-key="right" aria-label="Right">→</button>
        <button data-key="down" aria-label="Down">↓</button>
      </div>

      <div class="face" aria-label="Action buttons">
        <button data-key="b">B</button>
        <button data-key="a">A</button>
        <button data-key="select">SELECT</button>
        <button data-key="start">START</button>
      </div>

      <div class="speed-control">
        <label for="speed">Speed <output id="speed-value" for="speed">1x</output></label>
        <input id="speed" type="range" min="-1" max="3" step="0.01" value="0" />
      </div>
    </section>

    <p class="keys">Keyboard: arrows, Z=A, X=B, Enter=Start, Shift=Select.</p>
  </main>
  <script type="module" src="/web/app.js"></script>
</body>
</html>
